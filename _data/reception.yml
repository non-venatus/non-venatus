# =====================================================
# BOOK RECEPTION QUOTES
# =====================================================

quotes:
  - name: "Brian Massumi"
    title: "Author of 'Personality of Power' and Professor"
    institution: "Department of Communication, Université de Montréal"
    text: >
      How to write an affirmative book without resorting to the affirmation of another abstraction— a people, a nation, a state…a university? How to make an affirmation with a negation and a reversal at its heart? Read Praem Hidam’s Non-Venatus: On the Production of Wars and Universities to find these questions not answered but addressed in such unforeseen and crystalline ways that the meaning of terms such as “non” and “counter” relinquish being merely logical operations and instead become real movements of thought. So, the “non” in non-venatus is not simply the other of the figure of the “hunt”, the hunt of concepts to capture objects and the hunt of objects to exhaust worlds— rather, the “non-hunt” and “non-capture” are movements of thinking in minute and world-historical ways, which disassemble and reassemble extant conceptual machines. That is to say, extant machines of wars and universities are seen as much in their production as in their precarity: wars are not military and localised in the first place, just as universities are not universal and conceptual as a matter of institutional good faith. Indeed, the non-capture and the non-hunt are also strange abstractions in the sense of being “counter-abstractions” composed with deep alliances and a little malice (why not!). As a set of summary allusions— though the book laughs robustly at the citation industry (the little malice…) — I think of Gilles Deleuze’s statement that a universal explains nothing, every universal needs to be explained; and Michel Foucault’s motto that institutions must be subjected to analyses both more capillary and of greater generality than the institutional level itself, as I turn to the next scintillating page of Hidam’s book.
  - name: "Mehrdad Vahabi"
    title: "Author of 'Political Economy of Predation' and Professor"
    institution: "Economics, University of Sorbonne Nord"
    text: >
      In Non-Venatus, Praem Hidam investigates different modes of escape from
      predatory relationships. The book's originality lies in its insistence
      that stateless fugitives require a liberating culture and a new form of
      education — one capable of reinventing an imaginative, multiple, and
      wandering communal life through a speculative, imaginative history
      independent of official narratives. Hidam identifies three techniques of
      liberation: speculative history, talestrial practice, and the
      disestablishment of war.

  - name: "Soumyabrata Choudhury"
    title: "Author of 'Ambedkar and Other Immortals' and Professor"
    institution: "School of Arts and Aesthetics, JNU"
    text: >
      This book does something genuinely difficult: it builds an escape route
      from within the very structures it dismantles. An essential read for
      anyone thinking about fascism, knowledge, and resistance.

  - name: "Saikat Ghose"
    title: "Co-editor of 'Horror Fiction in the Global South' and Associate Professor"
    institution: "Department of English, SGTB Khalsa College, University of Delhi"
    text: >
      Praem Hidam's Non-Venatus is a theoretical tour de force that critiques
      the predatory nature of knowledge-driven systems and how these systems
      work through orders of abstraction and models of pedagogy that undermine,
      marginalise or exclude concrete experiential engagements with the world.
      It examines the nexus between power, discursive formations, epistemologies
      and institutional practices pertaining to education in societies that
      subject their populations to technological control and data-driven agendas
      under the guise of secular emancipatory ideals.
